name: Kumpulkan Tren (real-time)

# Menjalankan collector di CLOUD secara berkala → tulis ke D1.
# Google Trends (RSS, tanpa API key) selalu jalan.
# YouTube ikut jalan bila secret YOUTUBE_API_KEY tersedia.
on:
  schedule:
    - cron: "0 * * * *" # tiap jam
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platform (pisah spasi), mis. 'google youtube'"
        default: "google youtube twitter shopee"
        required: false

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
      SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
      GEO: "ID"
      LANG: "id"
      USE_OLLAMA: "0" # tidak ada Ollama di cloud → pakai Claude/heuristik
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (untuk wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps collector
        run: pip install -r collector/requirements.txt

      - name: Resolve D1 database id
        run: |
          set -e
          DB_ID="$(npx --yes wrangler@4 d1 list --json 2>/dev/null \
            | jq -r '.[]? | select(.name=="lagitren-db") | (.uuid // .database_id // .id // empty)' \
            | head -n1)"
          if [ -z "$DB_ID" ]; then
            echo "::error::Tidak menemukan database D1 lagitren-db."
            exit 1
          fi
          echo "CLOUDFLARE_D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"
          echo "Pakai D1: $DB_ID"

      - name: Jalankan collector
        working-directory: collector
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ env.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms }}"
          [ -z "$PLATFORMS" ] && PLATFORMS="google youtube twitter shopee"
          echo "Mengumpulkan: $PLATFORMS"
          python main.py $PLATFORMS
