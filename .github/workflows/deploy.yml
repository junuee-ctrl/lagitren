name: Deploy ke Cloudflare

# Deploy otomatis setiap push ke main, atau manual dari tab Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # ID penerbit AdSense (mis. ca-pub-123...). Publik → pakai Variables.
      NEXT_PUBLIC_ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
      # Token Cloudflare Web Analytics (publik). Isi via Variables → CF_ANALYTICS_TOKEN.
      NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ vars.CF_ANALYTICS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Diagnostik auth (whoami)
        run: |
          echo "== wrangler whoami (memperlihatkan izin token) =="
          npx --yes wrangler@4 whoami || true

      - name: Pastikan database D1 ada & ambil ID
        # Buat lagitren-db bila belum ada, lalu tulis database_id-nya
        # ke wrangler.toml secara otomatis (tidak perlu isi manual).
        run: |
          set -e
          UUID_RE='[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          extract_id() {
            # coba beberapa nama field dari output JSON d1 list
            echo "$1" | jq -r '.[]? | select(.name=="lagitren-db") | (.uuid // .database_id // .id // empty)' 2>/dev/null | head -n1
          }

          echo "== d1 list (stdout) =="
          RAW="$(npx --yes wrangler@4 d1 list --json 2>d1list.err || true)"
          echo "$RAW"
          echo "== d1 list (stderr) =="
          cat d1list.err || true

          DB_ID="$(extract_id "$RAW")"

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "== membuat D1 lagitren-db =="
            CREATE="$(npx --yes wrangler@4 d1 create lagitren-db 2>&1 || true)"
            echo "$CREATE"
            # ambil UUID langsung dari output 'wrangler d1 create'
            DB_ID="$(echo "$CREATE" | grep -oE "$UUID_RE" | head -n1)"
            if [ -z "$DB_ID" ]; then
              RAW2="$(npx --yes wrangler@4 d1 list --json 2>/dev/null || true)"
              DB_ID="$(extract_id "$RAW2")"
            fi
          fi

          if [ -z "$DB_ID" ] || [ "$DB_ID" = "null" ]; then
            echo "::error::Gagal mendapatkan database_id D1. Lihat output 'whoami' & 'd1 list stderr' di atas — pastikan token punya izin: D1 Edit, Workers Scripts Edit, Account Settings Read."
            exit 1
          fi

          echo "database_id terpakai = $DB_ID"
          sed -i "s/REPLACE_WITH_D1_DATABASE_ID/$DB_ID/" wrangler.toml
          echo "DB_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Terapkan skema D1 (idempotent)
        run: |
          npx --yes wrangler@4 d1 execute lagitren-db --remote --file=./db/schema.sql --yes
          # Tambah kolom yang mungkin belum ada di DB lama (abaikan error 'duplicate column').
          npx --yes wrangler@4 d1 execute lagitren-db --remote \
            --command "ALTER TABLE trends ADD COLUMN interest TEXT;" --yes || true
          npx --yes wrangler@4 d1 execute lagitren-db --remote \
            --command "ALTER TABLE trends ADD COLUMN is_current INTEGER NOT NULL DEFAULT 1;" --yes || true
          npx --yes wrangler@4 d1 execute lagitren-db --remote \
            --command "ALTER TABLE trends ADD COLUMN extra TEXT;" --yes || true
          # Indeks yang memakai is_current — dibuat setelah kolomnya pasti ada.
          npx --yes wrangler@4 d1 execute lagitren-db --remote \
            --command "CREATE INDEX IF NOT EXISTS idx_trends_current ON trends (platform, is_current, rank);" --yes || true

      - name: Build (OpenNext) & Deploy
        # Pakai biner yang sudah terpasang via `npm ci`
        # (paket npm bernama @opennextjs/cloudflare, biner-nya opennextjs-cloudflare).
        run: |
          npx opennextjs-cloudflare build
          npx wrangler deploy
